logging:
  # 日志级别：INFO（默认，只显示关键信息）或 DEBUG（显示详细耗时和token信息）
  level: INFO

dataset:
  # 数据集名称，用于组织输出目录：output/{name}/...
  name: 1-Dicarbonyl_Electrolyte_test
  # 原始语料路径（相对路径会以 PROJECT_DIR 或当前项目根目录为基准解析）
  corpus_path: input/2-Fluorinated_Hybrid_Diluent_Modulated_Electrolyte/corpus_cleaned.json
  # 是否已切好 chunk：设为 true 时跳过第一阶段 chunk 切分，直接使用 output/{name}/chunks_doc_{doc_id}.txt
  is_chunked: false

schema:
  # 二选一：
  # 1）指定 schema 名称（对应 schemas/{name}.json）
  name: 260114
  # 2）或指定完整路径（优先级高于 name）
  # path: configs/custom_schema.json

extraction:
  # 是否使用多阶段提取（默认 true）
  use_staged_extraction: true
  # 多阶段提取时，可选开启阶段 4 验证（非常耗 token）
  use_stage4_validation: true
  # 多阶段提取时，是否保存4个阶段的中间结果（按chunk输出JSON到输出目录下的 staged/ 子目录）
  save_stage_outputs: true

  # 阶段 4 验证参数（仅当 use_stage4_validation: true 时生效）
  stage4:
    # 三元组支持度最低分数阈值（低于此分数将被删除）
    min_triple_score: 0
    # 节点准确性最低分数阈值（低于此分数将被删除）
    min_node_score: 0
    # 是否使用 chunk 级别的 LLM 打分（检查 bad_cases）
    use_chunk_scoring: true
    # 是否启用节点准确性打分
    use_node_accuracy_scoring: true
    # 是否启用三元组支持度打分
    use_triple_support_scoring: true

  # 单阶段提取下的 prompt 配置（当 use_staged_extraction: false 时生效）：
  # 优先级：prompt_path > prompt_name > prompts/default.txt
  # prompt_name: default_single_stage
  # prompt_path: prompts/custom_prompt.txt

deduplication:
  # 是否启用基于 abbreviation 的实体消歧
  enable_abbreviation: true
  # 是否启用基于 CID 的实体消歧（需要本地 PubChem 数据库）
  enable_cid: true
  # 是否输出中间结果（*_intermediate.json），用于调试/分析
  intermediate_output: false
  # PubChem 本地数据库路径
  pubchem_db_path: pubchem_names_full.db

# 可选：上层元图谱构建（基于底层图谱 + chunks，抽取三元组间语义关系）
meta_graph:
  enable: true
  # chunks 路径，不填则使用首篇文档的 chunks_doc_0000.txt（多篇语料时可能缺少其他文档的上下文）
  chunks_path: null
  prompt_path: null
  max_chars_per_chunk: 2000
  max_total_chunk_chars: 50000

# 可选：元图谱质量评估（LLM source_alignment 打分，需 meta_graph.enable=true）
meta_graph_evaluation:
  enable: true
  chunks_path: null
  output_path: null
  prompt_path: null
  max_chars_per_chunk: 2000
  max_total_chunk_chars: 50000

# 社区聚类参数（该步骤必选）
# method: leiden | tree_comm，控制使用 Leiden 纯拓扑聚类 或 TreeComm 语义+结构双重感知聚类
community_clustering:
  method: leiden  # leiden（默认）或 tree_comm
  # Leiden 专用参数（method=leiden 时生效）
  max_cluster_size: 1000
  use_lcc: false
  seed: 42
  llm_prompt_path: null
  # TreeComm 专用参数（method=tree_comm 时生效）
  embedding_model: all-MiniLM-L6-v2  # 或 prompt2graph/models/iic_nlp_gte_sentence-embedding_english-base，或 local_embedding_service
  struct_weight: 0.3  # 结构相似度权重（0~1）

# 可选：社区质量评估（LLM 五维打分：主题一致性、可解释性、覆盖度、冗余度、与原文吻合度）
community_evaluation:
  enable: true
  # chunks 路径，不填则使用首篇文档的 chunks_doc_0000.txt
  chunks_path: null
  # 评估结果输出路径，不填则自动生成为 {base}_community_report_evaluation.json
  output_path: null
  prompt_path: null
  max_chars_per_chunk: 2000
  max_total_chunk_chars: 50000

output:
  # 最终输出图谱文件名：output/{dataset.name}/{timestamp}/{graph_name}
  graph_name: multi_stage_deduplicated.json

  # 可选：将最终图谱导入 Neo4j
  neo4j:
    # 是否启用 Neo4j 导入
    enable: false
    # 维护当前 Neo4j 图谱状态的 JSON 文件路径（用于增量合并）
    current_graph: current_graph.json
    # Neo4j 连接信息
    uri: bolt://localhost:7687
    user: neo4j
    password: password
    # 批次大小
    batch_size: 500
    # 是否重置 current_graph（true: 本次结果覆盖；false: 与 current_graph 增量合并）
    clear_first: false

